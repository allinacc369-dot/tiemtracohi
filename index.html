<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tiệm Trà Cô Hí</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .animate-pulse-slow { animation: pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .5; } }
    </style>
</head>
<body class="bg-orange-50">
    <div id="root"></div>

    <script type="text/babel">
        const { Phone, MapPin, Facebook, ExternalLink, MessageCircle, Share2, ChevronRight, UserPlus, Instagram, Heart, Coffee } = lucide;

        const App = () => {
            const shopData = {
                //name: "TIỆM TRÀ CÔ HÍ",
                //subName: "COFFEE & MILKTEA",
                address: "100 Nguyễn Thị Lựu, Phường Cao Lãnh, Đồng Tháp",
                phone: "0786889639",
                facebook: "https://www.facebook.com/tiemtracohi2",
                zaloLink: "https://zalo.me/0786889639",
                logoUrl: "https://api.deepai.org/job-view-file/60c1d683-9993-4a18-8742-9988459424e6/outputs/output.png", 
                colors: { primary: "#FF7D1A", secondary: "#5D2E17" }
            };

            const handleSaveContact = () => {
                // Định dạng vCard chuẩn để điện thoại dễ nhận diện
                const vCard = [
                    'BEGIN:VCARD',
                    'VERSION:3.0',
                    `FN:${shopData.name}`,
                    `ORG:${shopData.name};${shopData.subName}`,
                    `TEL;TYPE=CELL,VOICE:${shopData.phone}`,
                    `ADR;TYPE=WORK,PREF:;;100 Nguyen Thi Luu;Cao Lanh;Dong Thap;;Vietnam`,
                    `URL:${shopData.facebook}`,
                    'END:VCARD'
                ].join('\n');

                const blob = new Blob([vCard], { type: 'text/vcf;charset=utf-8' });
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.style.display = 'none';
                a.href = url;
                // Đặt tên file là .vcf để mobile mở app danh bạ
                a.download = 'TiemTraCoHi.vcf';
                document.body.appendChild(a);
                a.click();
                
                setTimeout(() => {
                    window.URL.revokeObjectURL(url);
                    document.body.removeChild(a);
                }, 100);
            };

            return (
                <div className="min-h-screen flex items-center justify-center p-4">
                    <div className="w-full max-w-md bg-white shadow-2xl rounded-[2.5rem] overflow-hidden border-[6px] border-stone-900 relative">
                        {/* Header */}
                        <div className="h-64 bg-[#FF7D1A] relative flex flex-col items-center justify-center pt-6">
                            <div className="z-10 bg-white p-1 rounded-3xl shadow-lg border-4 border-[#5D2E17]/10 mb-3 transform -rotate-2 overflow-hidden w-40 h-40 flex items-center justify-center">
                                <img 
                                    src="Logo_tiemtracohi.png" 
                                    alt="Tiệm Trà Cô Hí Logo" 
                                    className="w-full h-full object-contain"
                                    onerror="this.src='https://api.deepai.org/job-view-file/60c1d683-9993-4a18-8742-9988459424e6/outputs/output.png'"
                                />
                            </div>
                            <div className="z-10 text-center px-4 text-white">
                                <h1 className="text-2xl font-black tracking-wide leading-tight">{shopData.name}</h1>
                                <p className="font-bold text-xs tracking-[0.2em] opacity-90">{shopData.subName}</p>
                            </div>
                        </div>

                        {/* Actions */}
                        <div className="px-6 -mt-8 relative z-20">
                            <div className="bg-white rounded-3xl shadow-xl p-6 text-center border border-orange-100 flex flex-col items-center">
                                <div className="flex justify-center gap-3 w-full">
                                    <button onClick={handleSaveContact} className="flex-1 flex items-center justify-center gap-2 bg-[#FF7D1A] text-white py-3 rounded-2xl font-bold shadow-lg active:scale-95 transition-transform">
                                        <i data-lucide="user-plus" className="w-5 h-5"></i> Lưu liên hệ
                                    </button>
                                </div>
                            </div>
                        </div>

                        <div className="p-6 space-y-4">
                            <a href={`tel:0786889639`} className="flex items-center justify-between p-4 bg-white rounded-2xl border-2 border-orange-50 shadow-sm active:bg-orange-50 transition-colors">
                                <div className="flex items-center gap-4">
                                    <div className="p-3 bg-orange-100 text-[#FF7D1A] rounded-xl"><i data-lucide="phone" className="w-6 h-6"></i></div>
                                    <div className="text-left">
                                        <p className="text-sm font-black text-stone-800 uppercase">Gọi cho tiệm</p>
                                        <p className="text-xs font-bold text-orange-600">0786.889.639</p>
                                    </div>
                                </div>
                                <i data-lucide="chevron-right" className="text-stone-300"></i>
                            </a>

                            <a href="https://www.google.com/maps/search/100+Nguyễn+Thị+Lựu+Cao+Lãnh" target="_blank" className="flex items-center justify-between p-4 bg-white rounded-2xl border-2 border-orange-50 shadow-sm active:bg-orange-50 transition-colors">
                                <div className="flex items-center gap-4">
                                    <div className="p-3 bg-red-100 text-red-600 rounded-xl"><i data-lucide="map-pin" className="w-6 h-6"></i></div>
                                    <div className="text-left">
                                        <p className="text-sm font-black text-stone-800 uppercase">Địa chỉ</p>
                                        <p className="text-[10px] font-bold text-stone-500 w-40 leading-tight">{shopData.address}</p>
                                    </div>
                                </div>
                                <i data-lucide="chevron-right" className="text-stone-300"></i>
                            </a>

                            <a href={shopData.facebook} target="_blank" className="flex items-center justify-between p-4 bg-white rounded-2xl border-2 border-orange-50 shadow-sm active:bg-orange-50 transition-colors">
                                <div className="flex items-center gap-4">
                                    <div className="p-3 bg-blue-100 text-blue-700 rounded-xl"><i data-lucide="facebook" className="w-6 h-6"></i></div>
                                    <div className="text-left">
                                        <p className="text-sm font-black text-stone-800 uppercase tracking-tighter">Facebook Page</p>
                                        <p className="text-[10px] font-bold text-stone-500 italic">Ghé thăm chúng mình!</p>
                                    </div>
                                </div>
                                <i data-lucide="chevron-right" className="text-stone-300"></i>
                            </a>
                        </div>

                        <div className="px-6 mb-12 text-center">
                            <button className="w-full bg-[#5D2E17] text-white font-black py-4 rounded-3xl flex items-center justify-center gap-3 shadow-xl active:scale-95 transition-transform border-2 border-[#FF7D1A]/20">
                                <i data-lucide="coffee" className="w-6 h-6 text-[#FF7D1A]"></i>
                                <span className="uppercase tracking-widest text-sm">Xem Menu Thơm Ngon</span>
                            </button>
                            
                            <div className="mt-6 flex justify-center gap-8">
                                <div className="flex flex-col items-center gap-1 opacity-80 active:opacity-100">
                                    <div className="p-4 bg-stone-100 rounded-full shadow-inner"><i data-lucide="instagram" className="w-7 h-7 text-[#E4405F]"></i></div>
                                    <span className="text-[10px] font-black text-stone-500 uppercase tracking-tighter">Instagram</span>
                                </div>
                                <a href={shopData.zaloLink} target="_blank" className="flex flex-col items-center gap-1 opacity-80 active:opacity-100">
                                    <div className="p-4 bg-stone-100 rounded-full shadow-inner"><i data-lucide="message-circle" className="w-7 h-7 text-[#0068FF]"></i></div>
                                    <span className="text-[10px] font-black text-stone-500 uppercase tracking-tighter">Zalo Page</span>
                                </a>
                            </div>
                        </div>

                        <div className="text-center pb-8 opacity-40 text-[10px] font-black uppercase tracking-widest flex items-center justify-center gap-1">
                            Made with <i data-lucide="heart" className="w-2 h-2 fill-[#FF7D1A] text-[#FF7D1A] animate-pulse"></i> by Tiệm Trà Cô Hí
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
        
        // Khởi tạo icons sau khi render
        setTimeout(() => lucide.createIcons(), 500);
    </script>
</body>
</html>
